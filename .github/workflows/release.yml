name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            extension: .exe
    env:
      CGO_ENABLED: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          OUTPUT="c9e-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }}"
          echo "Building ${OUTPUT} (${VERSION})..."
          go build -ldflags "${LDFLAGS}" -o "${OUTPUT}" ./cmd/c9e/
      - uses: actions/upload-artifact@v4
        with:
          name: c9e-${{ matrix.goos }}-${{ matrix.goarch }}
          path: c9e-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }}

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" c9e-* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
