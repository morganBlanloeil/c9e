branches:
  - main

plugins:
  # Analyze commits to determine version bump
  - "@semantic-release/commit-analyzer":
      preset: conventionalcommits
      releaseRules:
        - type: feat
          release: minor
        - type: fix
          release: patch
        - type: perf
          release: patch
        - type: refactor
          release: patch
        - type: docs
          release: false
        - type: chore
          release: false
        - type: style
          release: false
        - type: test
          release: false
        - type: ci
          release: false

  # Generate release notes from commits
  - "@semantic-release/release-notes-generator":
      preset: conventionalcommits
      presetConfig:
        types:
          - type: feat
            section: "Features"
          - type: fix
            section: "Bug Fixes"
          - type: perf
            section: "Performance"
          - type: refactor
            section: "Refactoring"
          - type: docs
            section: "Documentation"
            hidden: true
          - type: chore
            hidden: true
          - type: ci
            hidden: true
          - type: test
            hidden: true

  # Update CHANGELOG.md
  - "@semantic-release/changelog":
      changelogFile: CHANGELOG.md

  # Commit updated CHANGELOG.md and tag
  - "@semantic-release/git":
      assets:
        - CHANGELOG.md
      message: "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"

  # Create GitHub release with binary assets
  - "@semantic-release/github":
      assets:
        - path: c9e-linux-amd64
          label: c9e-linux-amd64
        - path: c9e-linux-arm64
          label: c9e-linux-arm64
        - path: c9e-darwin-amd64
          label: c9e-darwin-amd64
        - path: c9e-darwin-arm64
          label: c9e-darwin-arm64
        - path: c9e-windows-amd64.exe
          label: c9e-windows-amd64.exe
